name: Benchmark

on:
  workflow_dispatch:
    inputs:
      benchtime:
        description: -benchtime value
        type: string
        default: 2s
      count:
        description: -count value
        type: string
        default: '3'

jobs:
  bench:
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: false

      - name: Run benchmarks
        working-directory: bench-2022-reproduction
        run: |
          go test -bench=. -benchmem \
            -benchtime=${{ inputs.benchtime }} \
            -count=${{ inputs.count }} \
            2>&1 | tee bench.txt

      - uses: actions/upload-artifact@v4
        with:
          name: bench-${{ matrix.runner }}
          path: bench-2022-reproduction/bench.txt

  summary:
    needs: bench
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Write summary
        run: |
          args=()
          for dir in artifacts/bench-*; do
            [ -f "$dir/bench.txt" ] || continue
            runner=$(basename "$dir" | sed 's/^bench-//')
            args+=("$runner=$dir/bench.txt")
          done
          {
            echo "## Benchmark results"
            echo ""
            echo "- benchtime: \`${{ inputs.benchtime }}\`"
            echo "- count: \`${{ inputs.count }}\`"
            echo ""
            if [ ${#args[@]} -gt 0 ]; then
              python3 .github/workflows/summarize.py "${args[@]}"
            else
              echo "No benchmark output was produced."
            fi
            for dir in artifacts/bench-*; do
              [ -f "$dir/bench.txt" ] || continue
              runner=$(basename "$dir" | sed 's/^bench-//')
              echo "<details><summary>Raw output: ${runner}</summary>"
              echo ""
              echo '```'
              cat "$dir/bench.txt"
              echo '```'
              echo ""
              echo "</details>"
              echo ""
            done
          } >> "$GITHUB_STEP_SUMMARY"
